# GPO Analyzer Web - Production Deployment
# 
# Use this for deploying from a container registry.
# Images are pulled from registry (no local build).
#
# PREREQUISITES:
#   1. Images pushed to registry (see build.sh)
#   2. Data directories exist on host
#
# DEPLOY:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# UPDATE:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d --force-recreate

services:
  backend:
    image: ${REGISTRY:-localhost}/gpo-analyzer-backend:${TAG:-latest}
    container_name: gpo-analyzer-api
    restart: unless-stopped
    ports:
      - "9846:8000"
    volumes:
      # Data volumes - persist across container updates
      - ./data/html_reports:/app/data/html_reports
      - ./data/uploads:/app/data/uploads
    environment:
      - GPO_HTML_FOLDER=/app/data/html_reports
      - GPO_UPLOAD_FOLDER=/app/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ${REGISTRY:-localhost}/gpo-analyzer-frontend:${TAG:-latest}
    container_name: gpo-analyzer-ui
    restart: unless-stopped
    ports:
      - "9845:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
